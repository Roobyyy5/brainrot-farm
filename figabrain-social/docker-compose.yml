services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: figabrain
      POSTGRES_PASSWORD: figabrain
      POSTGRES_DB: figabrain_social
    ports:
      - "5433:5432"
    volumes:
      - figabrain_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U figabrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4100
      DATABASE_URL: postgresql://figabrain:figabrain@postgres:5432/figabrain_social?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WALLET_ENCRYPTION_KEY: ${WALLET_ENCRYPTION_KEY}
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "4100:4100"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  figabrain_postgres_data:
